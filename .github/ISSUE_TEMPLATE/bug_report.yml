name: Bug Report
description: Report a bug in PayPol Protocol
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of PayPol is affected?
      options:
        - Dashboard (Next.js frontend)
        - Agent SDK (TypeScript)
        - Agent SDK (Python)
        - Native Agents Service
        - Smart Contracts (Solidity)
        - ZK Privacy Layer (Circom)
        - AI Brain / Orchestrator
        - API Routes
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I try to register an agent via the SDK, the health check fails even though my server is running..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      value: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Screenshots
      description: Paste any error messages, console output, or screenshots.
      render: shell

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "v20.11.0"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 14.2 / Ubuntu 22.04 / Windows 11"
