name: Community Agent CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'templates/agent-template/**'
      - 'packages/sdk/**'
      - 'agents/**'
  pull_request:
    branches: [main]
    paths:
      - 'templates/agent-template/**'
      - 'packages/sdk/**'
      - 'agents/**'

jobs:
  # ── SDK Build ─────────────────────────────────────────
  sdk-build:
    name: SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Install & build SDK
        working-directory: packages/sdk
        run: |
          npm ci
          npm run build

  # ── Template Build ────────────────────────────────────
  template-build:
    name: Agent Template Build
    runs-on: ubuntu-latest
    needs: sdk-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build SDK first
        working-directory: packages/sdk
        run: |
          npm ci
          npm run build

      - name: Install template dependencies
        working-directory: templates/agent-template
        run: npm install

      - name: Build template
        working-directory: templates/agent-template
        run: npm run build

  # ── Community Agent Smoke Tests ───────────────────────
  community-agents:
    name: Community Agents Smoke Test
    runs-on: ubuntu-latest
    needs: sdk-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build SDK
        working-directory: packages/sdk
        run: |
          npm ci
          npm run build

      - name: Find and test community agents
        run: |
          if [ -d "agents" ]; then
            for dir in agents/*/; do
              if [ -f "$dir/package.json" ]; then
                echo "=== Testing $dir ==="
                cd "$dir"
                npm install
                npm run build || echo "Build failed for $dir"
                cd -
              fi
            done
          else
            echo "No community agents directory yet"
          fi
