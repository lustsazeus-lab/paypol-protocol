name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Smart Contract Tests ───────────────────────────────
  contracts:
    name: Smart Contracts (Foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run Forge tests
        working-directory: packages/contracts
        run: forge test -vvv

  # ── Frontend Build ─────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/dashboard
        run: npx prisma generate

      - name: Type-check
        working-directory: apps/dashboard
        run: npx tsc --noEmit

      - name: Verify native modules
        working-directory: apps/dashboard
        run: |
          node -e "try { require('sqlite3'); console.log('sqlite3 OK') } catch(e) { console.log('sqlite3 FAIL:', e.message) }"
          node -e "try { require('@noir-lang/backend_barretenberg'); console.log('barretenberg OK') } catch(e) { console.log('barretenberg FAIL:', e.message) }"
          node -e "try { require('snarkjs'); console.log('snarkjs OK') } catch(e) { console.log('snarkjs FAIL:', e.message) }"

      - name: Build
        id: build
        continue-on-error: true
        working-directory: apps/dashboard
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_AGENT_API_URL: http://localhost:3001
          NEXT_PUBLIC_RPC_URL: https://rpc.moderato.tempo.xyz
          NEXT_PUBLIC_SHIELD_CONTRACT: "0x4cfcaE530d7a49A0FE8c0de858a0fA8Cf9Aea8B1"
          NEXT_PUBLIC_MULTISEND_CONTRACT: "0xc0e6F06EfD5A9d40b1018B0ba396A925aBC4cF69"
          NEXT_PUBLIC_NEXUS_V2_CONTRACT: "0x6A467Cd4156093bB528e448C04366586a1052Fab"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npx next build 2>&1

      - name: Upload build log on failure
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-log
          path: apps/dashboard/.next/trace

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

  # ── Agent SDK Build & Test ─────────────────────────────
  sdk:
    name: Agent SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Install & build SDK
        working-directory: packages/sdk
        run: |
          npm ci
          npm run build

  # ── Native Agents Service ──────────────────────────────
  agents:
    name: Native Agents Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/agents/package-lock.json

      - name: Install & build
        working-directory: services/agents
        run: |
          npm ci
          npm run build

  # ── Hardhat Contract Tests ─────────────────────────────
  nexus:
    name: PayPol Nexus (Hardhat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/nexus/package-lock.json

      - name: Install dependencies
        working-directory: packages/nexus
        run: npm ci
