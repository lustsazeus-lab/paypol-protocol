name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Smart Contract Tests ───────────────────────────────
  contracts:
    name: Smart Contracts (Foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run Forge tests
        working-directory: packages/contracts
        run: forge test -vvv

  # ── Frontend Build ─────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: Type-check
        working-directory: apps/dashboard
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/dashboard
        run: npm run build

  # ── Agent SDK Build & Test ─────────────────────────────
  sdk:
    name: Agent SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build SDK
        working-directory: packages/sdk
        run: |
          npm ci
          npm run build

  # ── Native Agents Service ──────────────────────────────
  agents:
    name: Native Agents Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build
        working-directory: services/agents
        run: |
          npm ci
          npm run build

  # ── Hardhat Contract Tests ─────────────────────────────
  nexus:
    name: PayPol Nexus (Hardhat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & test
        working-directory: packages/nexus
        run: |
          npm ci
          npm test
