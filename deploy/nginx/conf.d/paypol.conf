# ═══════════════════════════════════════════════════════════
# PayPol Protocol — Nginx Configuration
# paypol.xyz → Docker dashboard:3000
# ═══════════════════════════════════════════════════════════

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Upstream
upstream dashboard {
    server dashboard:3000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name paypol.xyz www.paypol.xyz;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://paypol.xyz$request_uri;
    }
}

# www → non-www redirect
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.paypol.xyz;

    ssl_certificate /etc/letsencrypt/live/paypol.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paypol.xyz/privkey.pem;

    return 301 https://paypol.xyz$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name paypol.xyz;

    # ── SSL ────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/paypol.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paypol.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ───────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static Assets (Next.js) ────────────────────────────
    location /_next/static/ {
        proxy_pass http://dashboard;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass http://dashboard;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── API Routes (rate limited) ──────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Everything Else ────────────────────────────────────
    location / {
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
