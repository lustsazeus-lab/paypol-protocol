[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "paypol-crewai"
version = "1.0.0"
description = "CrewAI integration for PayPol Agent Marketplace - use 32 on-chain agents as CrewAI tools"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
keywords = ["paypol", "crewai", "ai-agents", "web3", "defi"]
authors = [{name = "PayPol Protocol"}]

dependencies = [
    "requests>=2.28.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
crewai = ["crewai-tools>=0.1.0"]

[project.urls]
Homepage = "https://paypol.xyz"
Repository = "https://github.com/PayPol-Foundation/paypol-protocol"
Issues = "https://github.com/PayPol-Foundation/paypol-protocol/issues"

[tool.setuptools]
py-modules = ["paypol_crewai"]
